<div id="adabtech-wrapper" style="width: 100%; background: #000000; overflow-x: hidden; margin: 0; padding: 0;">
    
    <style>
        html, body { overflow-x: hidden !important; background-color: #000000 !important; }
        #adabtech-wrapper * { box-sizing: border-box; }

        .viewport-fix {
            position: relative;
            width: 100%;
            max-width: 100vw; 
            margin: 0 auto;
            background: #000000;
            overflow: hidden;
        }

        #iframe-solar-sim {
            width: 100% !important;
            min-width: 100% !important;
            display: block;
            border: none;
            background: #000000;
            min-height: 600px;
            /* Transición suave para cambios de altura al abrir el modal */
            transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Elimina márgenes de contenedores de WordPress que causan franjas blancas */
        .entry-content, .post-content { max-width: 100% !important; padding: 0 !important; }
    </style>

    <div class="viewport-fix">
        <iframe 
            id="iframe-solar-sim" 
            src="" 
            scrolling="no" 
            allowtransparency="true"
            loading="eager">
        </iframe>
    </div>

    <script>
        (function() {
            const iframe = document.getElementById('iframe-solar-sim');
            const currentDomain = window.location.origin;

            // Carga del archivo generado por el build de React
            iframe.src = currentDomain + "/assets/solar_simulator.html";

            function syncFrame(h) {
                if (h && h > 100) {
                    iframe.style.height = h + 'px';
                }
            }

            window.addEventListener('message', function(e) {
                // 1. Redimensionamiento dinámico enviado desde React
                if (e.data && e.data.type === 'resize') {
                    syncFrame(e.data.height);
                }
                
                // 2. Centrado vertical del componente al abrir el modal (Auto-scroll)
                if (e.data && (e.data.type === 'SOLAR_SIM_CENTER_MODAL' || e.data.type === 'SOLAR_SIM_OPEN_MODAL')) {
                    const rect = iframe.getBoundingClientRect();
                    const iframeTop = rect.top + window.pageYOffset;
                    const iframeHeight = rect.height;
                    const viewportHeight = window.innerHeight;

                    // Cálculo: Posición del iframe + mitad de su altura - mitad de la pantalla visible
                    const centerPosition = iframeTop + (iframeHeight / 2) - (viewportHeight / 2);

                    window.scrollTo({
                        top: centerPosition,
                        behavior: 'smooth'
                    });
                }
            }, false);

            const checkLayout = () => {
                try {
                    const doc = iframe.contentWindow.document;
                    const h = doc.documentElement.scrollHeight || doc.body.scrollHeight;
                    // Solo actualiza si la diferencia es mayor a 5px para evitar loops
                    if (h && Math.abs(h - iframe.offsetHeight) > 5) {
                        syncFrame(h);
                    }
                } catch (err) {
                    // Fallback para cross-origin handled por postMessage
                }
            };

            iframe.onload = () => {
                setTimeout(checkLayout, 300);
            };

            window.addEventListener('resize', checkLayout);
            setInterval(checkLayout, 1500);
        })();
    </script>
</div>
